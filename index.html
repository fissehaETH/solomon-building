
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f97316">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <title>Solomon Building Materials</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Noto Sans Ethiopic', 'Plus Jakarta Sans', sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      line-height: 1.6;
      background-color: #F8FAFC;
      user-select: none;
      height: 100vh;
      height: -webkit-fill-available;
    }
    
    .nav-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 32px;
      width: 64px;
      background-color: rgba(249, 115, 22, 0.15);
      border-radius: 100px;
      z-index: -1;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
    }

    .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    .safe-top { padding-top: env(safe-area-inset-top); }
    
    .glass {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    
    .blueprint {
      background-color: #0f172a;
      background-image: 
        linear-gradient(rgba(249, 115, 22, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249, 115, 22, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .android-header {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    /* Custom Scrollbar for Desktop */
    @media (min-width: 768px) {
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #cbd5e1;
      }
    }

    /* Hide scrollbars on mobile */
    @media (max-width: 767px) {
      .custom-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .custom-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    }
    
    .scroll-container {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    @media print {
      body {
        background: white !important;
      }
      #root > * {
        display: none !important;
      }
      #root {
        display: block !important;
      }
      /* Ensure the modal and its parents are visible but their siblings are not */
      .fixed.inset-0 {
        position: static !important;
        display: block !important;
        background: none !important;
        backdrop-filter: none !important;
      }
      .bg-white.w-full.max-w-md {
        box-shadow: none !important;
        border: none !important;
        width: 100% !important;
        max-width: none !important;
        position: static !important;
      }
      #receipt-content {
        display: block !important;
        padding: 0 !important;
      }
      /* Hide the buttons in the receipt modal during print */
      .bg-slate-50.border-t.border-slate-100.flex.gap-3 {
        display: none !important;
      }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.574.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body class="text-slate-900 overflow-x-hidden overflow-y-auto">
  <div id="root"></div>
  <!-- Standard entry point for Vite/NPM local development -->
  <script type="module" src="/index.tsx"></script>
</body>
</html>
